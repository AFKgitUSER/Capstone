
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS: Protocol Nemesis</title>
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            color: #00f2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. LOADING SCREEN STYLES */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a0a1a 0%, #05050a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-out;
        }

        .loader-circle {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 242, 255, 0.1);
            border-top: 4px solid #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .loading-text {
            margin-top: 20px;
            letter-spacing: 3px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            text-shadow: 0 0 8px #00f2ff;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 2. MAIN MENU STYLES (ARGUS) */
        #main-menu {
            display: none; /* Hidden until loading finishes */
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            letter-spacing: 15px;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff;
        }

        h2 {
            font-size: 18px;
            letter-spacing: 8px;
            color: rgba(0, 242, 255, 0.7);
            margin-bottom: 50px;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: none;
            border: 1px solid transparent;
            color: #00f2ff;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            border: 1px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 10px #00f2ff;
            transform: scale(1.05);
        }

        .exit-btn {
            color: #ff4b4b; /* Matching your "Exit" color in the UI frame */
        }
        
        .exit-btn:hover {
            border-color: #ff4b4b;
            box-shadow: 0 0 10px #ff4b4b;
            background: rgba(255, 75, 75, 0.1);
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle"></div>
        <div class="loading-text" id="status-update">INITIALIZING PROTOCOL...</div>
    </div>

    <div id="main-menu">
        <h1>ARGUS</h1>
        <h2>PROTOCOL NEMESIS</h2>
        
        <div class="menu-options">
            <button class="btn">Start Operation</button>
            <button class="btn">Continue</button>
            <button class="btn">Load Session</button>
            <button class="btn">Settings</button>
            <button class="btn exit-btn">Exit</button>
        </div>
    </div>

    <script>
        // Simple script to simulate loading then showing the menu
        const statusText = document.getElementById('status-update');
        const loadingScreen = document.getElementById('loading-screen');
        const mainMenu = document.getElementById('main-menu');

        const messages = [
            "DECRYPTING SECTOR 7 DATA...",
            "NEURAL NETWORK SYNCING...",
            "SYSTEM STATUS: OPERATIONAL"
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i < messages.length) {
                statusText.innerText = messages[i];
                i++;
            } else {
                clearInterval(interval);
                // Hide Loading and Show Menu
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'block';
                    setTimeout(() => { mainMenu.style.opacity = '1'; }, 50);
                }, 1000);
            }
        }, 1500);
    </script>
</body>
</html>
