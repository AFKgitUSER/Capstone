<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS Protocol HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00E5FF;
            --danger-red: #FF1744;
            --bg-dark: #02050A;
            --grid-color: rgba(0, 229, 255, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* The subtle background grid */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Corner Brackets */
        .bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 229, 255, 0.3);
        }
        .top-left { top: 30px; left: 30px; border-right: 0; border-bottom: 0; }
        .top-right { top: 30px; right: 30px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 30px; left: 30px; border-right: 0; border-top: 0; }

        /* Main Header Section */
        .header {
            text-align: center;
            margin-bottom: 60px;
            z-index: 10;
        }

        .main-title {
            font-family: 'Michroma', sans-serif;
            font-size: 4.5rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            /* Glow effect */
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 6px;
            margin-top: 10px;
            opacity: 0.7;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            padding-top: 5px;
            display: inline-block;
        }

        /* Menu Section */
        .menu-list {
            list-style: none;
            text-align: center;
            z-index: 10;
        }

        .menu-item {
            margin: 25px 0;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .menu-item:hover {
            opacity: 1;
            text-shadow: 0 0 10px var(--neon-cyan);
            transform: scale(1.1);
        }

        .menu-item.exit {
            color: var(--danger-red);
            margin-top: 40px;
        }

        .menu-item.exit:hover {
            text-shadow: 0 0 10px var(--danger-red);
        }

        /* Bottom Status Text */
        .footer-status {
            position: absolute;
            bottom: 12%;
            text-align: center;
            font-size: 0.7rem;
            line-height: 1.8;
            z-index: 10;
            background: rgba(2, 5, 10, 0.8);
            padding: 10px 20px;
            border-radius: 4px;
        }

        .critical {
            color: var(--danger-red);
            font-weight: bold;
        }

        /* CSS-only City Skyline */
        .skyline {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 0 20px;
            opacity: 0.4;
            pointer-events: none;
        }

        .building {
            width: 45px;
            background: linear-gradient(to top, rgba(0, 229, 255, 0.2), transparent);
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-bottom: none;
            position: relative;
        }

        /* Creating the "windows" with dots */
        .building::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            box-shadow: 
                0 20px var(--neon-cyan), 
                -10px 40px var(--neon-cyan), 
                10px 60px var(--neon-cyan),
                0 80px var(--neon-cyan);
        }

    </style>
</head>
<body>

    <div class="bracket top-left"></div>
    <div class="bracket top-right"></div>
    <div class="bracket bottom-left"></div>

    <div class="header">
        <h1 class="main-title">ARGUS</h1>
        <div class="subtitle">PROTOCOL NEMESIS</div>
    </div>

    <ul class="menu-list">
        <li class="menu-item">Start Operation</li>
        <li class="menu-item">Continue</li>
        <li class="menu-item">Load Session</li>
        <li class="menu-item">Settings</li>
        <li class="menu-item exit">Exit</li>
    </ul>

    <div class="footer-status">
        <div>SYSTEM STATUS: OPERATIONAL</div>
        <div>LOCATION: NEO-TOKYO SECTOR 7 // 2085.03.05</div>
        <div class="critical">THREAT LEVEL: CRITICAL</div>
    </div>

    <div class="skyline">
        <div class="building" style="height: 60px;"></div>
        <div class="building" style="height: 110px;"></div>
        <div class="building" style="height: 80px;"></div>
        <div class="building" style="height: 130px;"></div>
        <div class="building" style="height: 90px;"></div>
        <div class="building" style="height: 120px;"></div>
        <div class="building" style="height: 70px;"></div>
        <div class="building" style="height: 100px;"></div>
        <div class="building" style="height: 60px;"></div>
        <div class="building" style="height: 110px;"></div>
    </div>

</body>
</html>
