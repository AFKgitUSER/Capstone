<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS: Protocol Nemesis</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Michroma&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- CORE UI STYLES --- */
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #05050a;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MAIN MENU --- */
        #main-menu {
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .title-container h1 {
            font-size: 90px; margin: 0;
            letter-spacing: 12px;
            text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
        }

        .subtitle {
            font-size: 16px; letter-spacing: 6px;
            color: rgba(0, 242, 255, 0.6);
            margin-bottom: 60px; text-transform: uppercase;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            padding: 12px 30px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 280px;
            font-size: 16px;
        }

        .btn:hover { 
            background: #00E5FF; 
            color: #02050A; 
            box-shadow: 0 0 15px #00E5FF; 
            transform: translateX(10px); 
        }

        .danger-btn { 
            border-color: #FF1744; 
            color: #FF1744; 
        }

        .danger-btn:hover { 
            background: #FF1744; 
            color: white; 
            box-shadow: 0 0 15px #FF1744; 
        }

    </style>
</head>
<body>

    <div id="main-menu">
        <div class="title-container">
            <h1>ARGUS</h1>
            <div class="subtitle">PROTOCOL NEMESIS</div>
        </div>
        <div class="menu-options">
            <button class="btn" onclick="window.location.href='start-op.html'">Start Operation</button>
            <button class="btn">Continue</button>
            <button class="btn" onclick="window.location.href='load.html'">Load Session</button>
            <button class="btn" onclick="window.location.href='settings.html'">Settings</button>
            <button class="btn danger-btn">Exit</button>
        </div>
    </div>

    <script>
        // Trigger the fade-in effect on load
        window.onload = () => {
            document.getElementById('main-menu').style.opacity = '1';
        };
    </script>
</body>
</html>
