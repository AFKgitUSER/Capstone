<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS: System Configuration</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Michroma&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- CORE UI STYLES --- */
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #05050a;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- CONFIGURATION FRAME --- */
        .settings-frame {
            width: 600px;
            padding: 50px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            background: linear-gradient(180deg, rgba(0, 229, 255, 0.05) 0%, transparent 100%);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .michroma-title {
            font-family: 'Michroma', sans-serif;
            font-size: 36px;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #00E5FF;
            margin-bottom: 5px;
            color: #00E5FF;
            text-transform: uppercase;
        }

        .subtitle-small {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* --- SETTINGS LAYOUT --- */
        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            text-align: left;
            margin-bottom: 40px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hud-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(0, 229, 255, 0.7);
            font-weight: bold;
        }

        /* Interactive Elements */
        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: rgba(0, 229, 255, 0.2);
            outline: none;
            margin-top: 10px;
        }

        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00E5FF;
            cursor: pointer;
            box-shadow: 0 0 10px #00E5FF;
            border-radius: 2px;
        }

        .btn-group {
            display: flex;
            gap: 2px;
        }

        .small-btn {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00E5FF;
            padding: 8px 20px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.2s;
        }

        .small-btn.active {
            background: #00E5FF;
            color: #05050a;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* --- FOOTER BUTTONS --- */
        .footer-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-main {
            background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00E5FF;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 340px;
            font-size: 14px;
        }

        .btn-main:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00E5FF;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .danger-btn {
            color: #ff4b4b;
            border-color: rgba(255, 75, 75, 0.3);
        }

        .danger-btn:hover {
            background: rgba(255, 75, 75, 0.1);
            border-color: #ff4b4b;
            color: #ff4b4b;
            box-shadow: 0 0 15px rgba(255, 75, 75, 0.3);
        }
    </style>
</head>
<body>

    <div class="settings-frame">
        <h2 class="michroma-title">SYSTEM_CONFIG</h2>
        <div class="subtitle-small">Manual Calibration Required</div>

        <div class="settings-grid">
            <div class="setting-item">
                <span class="hud-label">Graphics Quality</span>
                <div class="btn-group">
                    <button class="small-btn" onclick="setQuality(this)">LOW</button>
                    <button class="small-btn active" onclick="setQuality(this)">MEDIUM</button>
                    <button class="small-btn" onclick="setQuality(this)">HIGH</button>
                </div>
            </div>

            <div class="setting-item">
                <span class="hud-label">Audio Levels (Master / Music / SFX)</span>
                <input type="range" class="cyber-slider" min="0" max="100" value="80">
            </div>

            <div class="setting-item">
                <span class="hud-label">Mouse Sensitivity (Look Speed)</span>
                <input type="range" class="cyber-slider" min="1" max="10" value="5">
            </div>

            <div class="setting-item">
                <span class="hud-label">Subtitles</span>
                <button class="small-btn active" style="width: 120px;" onclick="toggleBtn(this)">ENABLED</button>
            </div>
        </div>

        <div class="footer-actions">
            <button class="btn-main" onclick="saveAndExit()">SAVE & RESUME</button>
            <button class="btn-main danger-btn" onclick="window.location.href='index.html'">ABORT</button>
        </div>
    </div>

    <script>
        function setQuality(btn) {
            const btns = btn.parentElement.querySelectorAll('.small-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleBtn(btn) {
            btn.classList.toggle('active');
            btn.innerText = btn.classList.contains('active') ? 'ENABLED' : 'DISABLED';
        }

        function saveAndExit() {
            // Add save logic here (e.g., localStorage)
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
